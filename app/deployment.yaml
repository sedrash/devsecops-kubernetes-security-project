apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2-backend
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2-backend
  template:
    metadata:
      labels:
        app: app2-backend
    spec:
      automountServiceAccountToken: false
      containers:
      - name: backend
        image: app2-backend:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
          protocol: TCP
      restartPolicy: Always
