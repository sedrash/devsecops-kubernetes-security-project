apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: zerotrust
type: Opaque
data:
  POSTGRES_PASSWORD: cG9zdGdyZXM=   # "postgres" en base64

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: zerotrust
data:
  POSTGRES_DB: appdb
  POSTGRES_USER: appuser

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: zerotrust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zerotrust
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
